<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADMINISTRACIÓN | CIA ABOGADOS</title>
  <!-- Favicon -->
  <link rel="icon" sizes="192x192" href="https://www.wix.com/favicon.ico" type="image/x-icon">
  <link rel="shortcut icon" href="https://www.wix.com/favicon.ico" type="image/x-icon">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
  <style>
    body.admin-login-body {
      background-color: var(--secondary-dark, #121212);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .login-container {
      width: 100%;
      max-width: 420px;
      background-color: #1e1e1e;
      border: 1px solid #2e2e2e;
      border-top: 3px solid var(--accent-gold, #93731b);
      padding: 40px 30px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .login-logo {
      width: 160px;
      height: auto;
      margin-bottom: 30px;
      filter: brightness(0) invert(1);
    }
    .login-title {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      color: var(--text-light, #ffffff);
      margin-bottom: 25px;
      text-transform: uppercase;
      text-align: center;
    }
    .login-form {
      width: 100%;
    }
    .login-group {
      margin-bottom: 20px;
      width: 100%;
    }
    .login-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #b3b3b3;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .login-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #3e3e3e;
      background-color: #2a2a2a;
      color: #ffffff;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }
    .login-input:focus {
      outline: none;
      border-color: var(--accent-gold, #93731b);
      background-color: #2e2e2e;
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background-color: var(--accent-gold, #93731b);
      border: none;
      color: #ffffff;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }
    .login-btn:hover {
      background-color: var(--accent-gold-hover, #b69f75);
    }
    .login-error {
      width: 100%;
      padding: 12px;
      background-color: rgba(184, 50, 50, 0.15);
      border: 1px solid #b83232;
      color: #ff8a8a;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }
    .back-to-web {
      margin-top: 25px;
      font-size: 0.8rem;
      color: #888888;
      letter-spacing: 0.05em;
      transition: color 0.3s ease;
    }
    .back-to-web:hover {
      color: var(--accent-gold, #93731b);
    }
  </style>
</head>
<body class="admin-login-body">

  <div class="login-container">
    <img src="https://static.wixstatic.com/media/91e9c7_2a2a400700364da784ee889b31d40556~mv2.png" alt="Cia Abogados Logo" class="login-logo">
    <h2 class="login-title">Acceso de Administración</h2>
    
    <div class="login-error" id="loginError">Usuario o contraseña incorrectos.</div>
    
    <form class="login-form" id="loginForm">
      <div class="login-group">
        <label class="login-label" for="username">Usuario</label>
        <input type="text" class="login-input" id="username" autocomplete="username" required>
      </div>
      
      <div class="login-group">
        <label class="login-label" for="password">Contraseña</label>
        <input type="password" class="login-input" id="password" autocomplete="current-password" required>
      </div>
      
      <button type="submit" class="login-btn">Ingresar</button>
    </form>
    
    <a href="index.html" class="back-to-web">← Volver al sitio web</a>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loginForm = document.getElementById('loginForm');
      const loginError = document.getElementById('loginError');
      
      // If already logged in, redirect to home
      if (localStorage.getItem('admin_logged_in') === 'true') {
        window.location.href = 'index.html';
      }
      
      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const usernameInput = document.getElementById('username').value.trim();
        const passwordInput = document.getElementById('password').value;
        
        // Credentials validation
        if (usernameInput === 'juridic45' && passwordInput === 'JUD3445.-..-') {
          localStorage.setItem('admin_logged_in', 'true');
          loginError.style.display = 'none';
          
          // Show quick success state
          const btn = loginForm.querySelector('.login-btn');
          btn.textContent = 'Accediendo...';
          btn.style.backgroundColor = '#2b7040';
          
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 600);
        } else {
          loginError.style.display = 'block';
          document.getElementById('password').value = '';
        }
      });
    });
  </script>
</body>
</html>
